<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECharts</title>
  <!-- 1. 引入 ECharts CDN（核心：必须公网可访问） -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    /* 2. 消除白边/滚动条：让图表占满 iframe 容器 */
    * {margin:0;padding:0;box-sizing:border-box}
    html,body {width:100%;height:100%;overflow:hidden}
    #main {width:100%;height:100%}
  </style>
</head>
<body>
  <!-- 3. 图表容器：必须和 JS 中的 ID 对应 -->
  <div id="main"></div>
  <script>
    // 4. 初始化图表
    const chartDom = document.getElementById('main');
    const myChart = echarts.init(chartDom);
    // 5. 图表配置（核心：替换成自己的业务数据/样式）
    const option = {
      backgroundColor: 'transparent', // 关键：适配 Readymag 透明背景
      xAxis: {type: 'category', data: ['周一','周二','周三','周四','周五','周六','周日']},
      yAxis: {type: 'value'},
      series: [{type: 'bar', data: [120,200,150,80,70,110,130]}]
    };
    myChart.setOption(option);
    // 6. 自适应：iframe 大小变化时，图表自动缩放
    window.addEventListener('resize', ()=>myChart.resize())
  </script>
</body>
</html>
